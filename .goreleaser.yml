version: 2

before:
  hooks:
    - "bash -c 'cd sensor_hub && go mod tidy'"
    - "bash -c 'cd sensor_hub && go build -o sensor-hub . && ./sensor-hub completion bash > ../packaging/completions/sensor-hub.bash && ./sensor-hub completion zsh > ../packaging/completions/_sensor-hub && ./sensor-hub completion fish > ../packaging/completions/sensor-hub.fish && rm sensor-hub'"

builds:
  - id: sensor-hub
    dir: sensor_hub
    binary: sensor-hub
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: >-
      sensor-hub_{{ .Version }}_{{ .Os }}_{{ .Arch }}

nfpms:
  - id: sensor-hub
    package_name: sensor-hub
    vendor: Home Temperature Monitoring
    homepage: https://github.com/tom-molotnikoff/home-temperature-monitoring
    maintainer: Tom Molotnikoff
    description: Home temperature monitoring system with embedded web UI
    license: MIT
    formats:
      - rpm
      - deb
    bindir: /usr/bin

    contents:
      - src: packaging/sensor-hub.service
        dst: /usr/lib/systemd/system/sensor-hub.service

      - src: packaging/completions/sensor-hub.bash
        dst: /usr/share/bash-completion/completions/sensor-hub

      - src: packaging/completions/_sensor-hub
        dst: /usr/share/zsh/site-functions/_sensor-hub

      - src: packaging/completions/sensor-hub.fish
        dst: /usr/share/fish/vendor_completions.d/sensor-hub.fish

      - src: packaging/logrotate.conf
        dst: /etc/logrotate.d/sensor-hub

      - src: packaging/nginx.conf.example
        dst: /etc/sensor-hub/nginx.conf.example

      - src: packaging/environment
        dst: /etc/sensor-hub/environment
        type: config|noreplace
        file_info:
          mode: 0640
          owner: sensor-hub
          group: sensor-hub

      - src: packaging/defaults/application.properties
        dst: /etc/sensor-hub/application.properties
        type: config|noreplace
        file_info:
          mode: 0640
          owner: sensor-hub
          group: sensor-hub

      - src: packaging/defaults/database.properties
        dst: /etc/sensor-hub/database.properties
        type: config|noreplace
        file_info:
          mode: 0640
          owner: sensor-hub
          group: sensor-hub

      - src: packaging/defaults/smtp.properties
        dst: /etc/sensor-hub/smtp.properties
        type: config|noreplace
        file_info:
          mode: 0640
          owner: sensor-hub
          group: sensor-hub

    scripts:
      preinstall: packaging/scripts/preinstall.sh
      postinstall: packaging/scripts/postinstall.sh
      preremove: packaging/scripts/preremove.sh
      postremove: packaging/scripts/postremove.sh

    rpm:
      group: Applications/System

    conflicts:
      - sensor-hub-cli

    overrides:
      deb:
        dependencies:
          - adduser

  - id: sensor-hub-cli
    package_name: sensor-hub-cli
    vendor: Home Temperature Monitoring
    homepage: https://github.com/tom-molotnikoff/home-temperature-monitoring
    maintainer: Tom Molotnikoff
    description: Sensor Hub CLI client for interacting with a remote Sensor Hub instance
    license: MIT
    formats:
      - rpm
      - deb
    bindir: /usr/bin

    contents:
      - src: packaging/completions/sensor-hub.bash
        dst: /usr/share/bash-completion/completions/sensor-hub

      - src: packaging/completions/_sensor-hub
        dst: /usr/share/zsh/site-functions/_sensor-hub

      - src: packaging/completions/sensor-hub.fish
        dst: /usr/share/fish/vendor_completions.d/sensor-hub.fish

    rpm:
      group: Applications/System

    conflicts:
      - sensor-hub

signs:
  - artifacts: all
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  extra_files:
    - glob: sensor-hub-gpg-public.key

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
