version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/sensor_hub"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      go-minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/sensor_hub/ui/sensor_hub_ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm-minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm-minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/temperature_sensor"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      pip-minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/sensor_hub/docker_tests"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      pip-minor-and-patch:
        update-types: ["minor", "patch"]
