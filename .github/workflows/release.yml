name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "npm"
          cache-dependency-path: sensor_hub/ui/sensor_hub_ui/package-lock.json

      - name: Build React UI
        working-directory: sensor_hub/ui/sensor_hub_ui
        run: |
          npm ci
          npm run build

      - name: Copy UI dist to web/dist
        run: |
          mkdir -p sensor_hub/web/dist
          cp -r sensor_hub/ui/sensor_hub_ui/dist/* sensor_hub/web/dist/

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: sensor_hub/go.mod
          cache-dependency-path: sensor_hub/go.sum

      - name: Run tests
        working-directory: sensor_hub
        run: go test ./...

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build temperature-sensor debs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          scripts/build-packages.sh sensor --version "$VERSION" --output-dir dist/
          scripts/build-packages.sh sensor-lite --version "$VERSION" --output-dir dist/

      - name: Sign temperature-sensor debs
        run: |
          for deb in dist/temperature-sensor*.deb; do
            gpg --batch --local-user "${{ steps.import_gpg.outputs.fingerprint }}" \
              --output "${deb}.sig" --detach-sign "$deb"
          done

      - name: Upload temperature-sensor debs to release
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/temperature-sensor*.deb dist/temperature-sensor*.deb.sig
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
