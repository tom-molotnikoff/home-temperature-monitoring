      summary: Get current user info
      description: Returns the currently authenticated user's information and a fresh CSRF token.
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Not authenticated

  /auth/sessions:
    get:
      tags:
        - auth
      summary: List user sessions
      description: Returns all active sessions for the current user.
      operationId: listSessions
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionInfo'
        '401':
          description: Not authenticated
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/sessions/{id}:
    delete:
      tags:
        - auth
      summary: Revoke a session
      description: >-
        Revokes a specific session by ID. Users can revoke their own sessions.
        Admins can revoke any session.
      operationId: revokeSession
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Session ID to revoke
      responses:
        '200':
          description: Session revoked
        '400':
          description: Invalid session ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
        '403':
          description: Cannot revoke other user's session (non-admin)
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

