      x-required-permission: manage_oauth
      responses:
        '200':
          description: Authorization URL and state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthAuthorizeResponse'
        '401':
          description: Not authenticated
        '403':
          description: Insufficient permissions
        '500':
          description: Failed to generate state or URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: OAuth not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /oauth/submit-code:
    post:
      tags:
        - oauth
      summary: Submit OAuth authorization code
      description: >-
        Submits the authorization code received from OAuth provider.
        Used with out-of-band OAuth flow. Requires manage_oauth permission.
      operationId: submitOAuthCode
      x-required-permission: manage_oauth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthSubmitCodeRequest'
      responses:
        '200':
          description: Authorization successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: Invalid request or expired state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
        '403':
          description: Insufficient permissions
        '500':
          description: Failed to exchange code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: OAuth not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /oauth/reload:
    post:
      tags:
        - oauth
      summary: Reload OAuth configuration
      description: >-
        Reloads OAuth credentials and token from disk.
        Requires manage_oauth permission.
      operationId: reloadOAuth
      x-required-permission: manage_oauth
      responses:
        '200':
          description: Configuration reloaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '401':
          description: Not authenticated
        '403':
          description: Insufficient permissions
        '500':
          description: Failed to reload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: OAuth not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


  /dashboards:
    get:
      tags: [dashboards]
      summary: List all dashboards
      description: Returns all dashboards owned by or shared with the authenticated user.
      operationId: listDashboards
      x-required-permission: view_dashboards
      responses:
        '200':
          description: List of dashboards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dashboard'
        '401': { description: Not authenticated }
        '403': { description: Insufficient permissions }
    post:
      tags: [dashboards]
      summary: Create a dashboard
      description: Creates a new dashboard for the authenticated user.
      operationId: createDashboard
      x-required-permission: manage_dashboards
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDashboardRequest'
      responses:
        '201':
          description: Dashboard created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
        '400': { description: Invalid request body }
        '401': { description: Not authenticated }
        '403': { description: Insufficient permissions }
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /dashboards/{id}:
    get:
      tags: [dashboards]
      summary: Get a dashboard by ID
      description: Returns a single dashboard by its ID.
      operationId: getDashboard
      x-required-permission: view_dashboards
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Dashboard details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dashboard'
        '400': { description: Invalid dashboard ID }
        '401': { description: Not authenticated }
        '404': { description: Dashboard not found }
    put:
      tags: [dashboards]
      summary: Update a dashboard
      description: Updates the name and/or widget configuration of a dashboard. Only the owner can update.
      operationId: updateDashboard
      x-required-permission: manage_dashboards
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDashboardRequest'
      responses:
        '200':
          description: Dashboard updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400': { description: Invalid request }
        '401': { description: Not authenticated }
        '403': { description: Insufficient permissions }
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [dashboards]
      summary: Delete a dashboard
      description: Deletes a dashboard. Only the owner can delete.
      operationId: deleteDashboard
      x-required-permission: manage_dashboards
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Dashboard deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400': { description: Invalid dashboard ID }
        '401': { description: Not authenticated }
        '403': { description: Insufficient permissions }
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /dashboards/{id}/share:
    post:
      tags: [dashboards]
      summary: Share a dashboard
      description: Creates a copy of the dashboard for another user.
      operationId: shareDashboard
      x-required-permission: manage_dashboards
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareDashboardRequest'
      responses:
        '200':
          description: Dashboard shared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400': { description: Invalid request }
        '401': { description: Not authenticated }
        '403': { description: Insufficient permissions }
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /dashboards/{id}/default:
    put:
      tags: [dashboards]
      summary: Set default dashboard
      description: Sets a dashboard as the default for the authenticated user.
      operationId: setDefaultDashboard
      x-required-permission: manage_dashboards
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Default dashboard set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400': { description: Invalid dashboard ID }
        '401': { description: Not authenticated }
        '403': { description: Insufficient permissions }
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api-keys:
    get:
      tags: [api-keys]
      summary: List API keys
      description: Returns all API keys for the authenticated user. The full key value is never returned — only the prefix is shown.
      operationId: listApiKeys
      x-required-permission: manage_api_keys
      responses:
        '200':
          description: Array of API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKey'
        '401': { description: Not authenticated }
        '403': { description: Insufficient permissions }
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [api-keys]
      summary: Create a new API key
      description: >-
        Creates a new API key for the authenticated user. The full key is returned
        **only once** in the response — it cannot be retrieved again. Store it securely.
      operationId: createApiKey
      x-required-permission: manage_api_keys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  description: A descriptive name for this API key
                  example: "CI/CD Pipeline"
                expires_at:
                  type: string
                  format: date-time
                  nullable: true
                  description: Optional expiration timestamp (RFC 3339). Null means the key never expires.
                  example: "2027-01-01T00:00:00Z"
      responses:
        '201':
          description: API key created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string
                    description: The full API key. Store it securely — it will not be shown again.
                    example: "shk_a1b2c3d4e5f6..."
                  message:
                    type: string
                    example: "Store this key securely. It will not be shown again."
        '400': { description: Invalid request body }
        '401': { description: Not authenticated }
        '403': { description: Insufficient permissions }
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api-keys/{id}/expiry:
    patch:
      tags: [api-keys]
      summary: Update API key expiry
      description: Updates the expiration date of an existing API key owned by the authenticated user.
      operationId: updateApiKeyExpiry
      x-required-permission: manage_api_keys
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
          description: API key ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                expires_at:
                  type: string
                  format: date-time
                  nullable: true
                  description: New expiration timestamp, or null to remove expiration.
                  example: "2027-06-01T00:00:00Z"
      responses:
        '200':
          description: Expiry updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400': { description: Invalid key ID or request body }
        '401': { description: Not authenticated }
        '403': { description: Insufficient permissions }
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api-keys/{id}/revoke:
    post:
      tags: [api-keys]
      summary: Revoke an API key
      description: >-
        Permanently revokes an API key. A revoked key can no longer be used for
        authentication but remains visible in the key list until deleted.
      operationId: revokeApiKey
      x-required-permission: manage_api_keys
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
          description: API key ID
      responses:
        '200':
          description: API key revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400': { description: Invalid key ID }
        '401': { description: Not authenticated }
        '403': { description: Insufficient permissions }
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api-keys/{id}:
    delete:
      tags: [api-keys]
      summary: Delete an API key
      description: Permanently deletes an API key owned by the authenticated user.
      operationId: deleteApiKey
      x-required-permission: manage_api_keys
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
          description: API key ID
      responses:
        '200':
          description: API key deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400': { description: Invalid key ID }
        '401': { description: Not authenticated }
        '403': { description: Insufficient permissions }
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ApiKey:
      type: object
      description: An API key belonging to a user. The full key value is never returned after creation.
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "CI/CD Pipeline"
        key_prefix:
          type: string
          description: First characters of the key for identification
          example: "shk_a1b2"
        user_id:
          type: integer
          example: 1
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Expiration timestamp, or null if the key never expires
          example: "2027-01-01T00:00:00Z"
        revoked:
          type: boolean
          description: Whether the key has been revoked
          example: false
        last_used_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of last usage, or null if never used
        created_at:
          type: string
          format: date-time
          example: "2026-04-01T12:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-04-01T12:00:00Z"

    Reading:
      type: object
      description: |
        A single sensor reading. Use `time` as the event timestamp and
        `sensor_name` to identify the source. `measurement_type` indicates
        what is being measured (e.g. "temperature", "humidity").
        `numeric_value` holds the numeric measurement (nullable for non-numeric
        readings), `text_state` holds a textual state (nullable), and `unit`
        is the unit of measurement. `id` is an internal integer identifier
        for the reading (if available).
      properties:
        id:
          type: integer
          description: Internal identifier for the reading (if available).
        sensor_name:
          type: string
          description: Human-readable sensor name. This is the series key an MCP should use to group measurements.
        measurement_type:
          type: string
          description: Type of measurement (e.g. "temperature", "humidity").
        numeric_value:
          type: number
          format: float
          nullable: true
          description: Numeric measurement value (null for non-numeric readings).
        text_state:
          type: string
          nullable: true
          description: Textual state value (null for numeric-only readings).
        unit:
          type: string
          description: Unit of measurement (e.g. "°C", "%").
        time:
          type: string
          format: date-time
          description: RFC3339 timestamp for when the reading was recorded. Use this for x-axis time in graphs.
      required:
        - sensor_name
        - measurement_type
        - time
      example:
        id: 101
        sensor_name: "living-room"
        measurement_type: "temperature"
        numeric_value: 21.4
        text_state: null
        unit: "°C"
        time: "2026-01-10T12:00:00Z"

    CurrentReadingsMessage:
      type: object
      description: |
        Snapshot message containing the latest readings for one or more sensors.
        Sent immediately after WebSocket connect and optionally as full-snapshot updates.
      properties:
        timestamp:
          type: string
          format: date-time
          description: Server timestamp for the snapshot (RFC3339).
        readings:
          type: array
          items:
            $ref: '#/components/schemas/Reading'
      required:
        - timestamp
        - readings
      example:
        timestamp: "2026-01-10T12:00:00Z"
        readings:
          - id: 201
            sensor_name: "living-room"
            measurement_type: "temperature"
            numeric_value: 21.4
            text_state: null
            unit: "°C"
            time: "2026-01-10T12:00:00Z"
          - id: 202
            sensor_name: "bedroom"
            measurement_type: "temperature"
            numeric_value: 19.8
            text_state: null
            unit: "°C"
            time: "2026-01-10T12:00:10Z"

    Sensor:
      type: object
      description: |
        Metadata for a sensor as returned by sensors endpoints and WebSocket snapshots.
      properties:
        id:
          type: integer
          description: Internal numeric id for the sensor (database primary key).
        name:
          type: string
          description: Human-friendly sensor name (used as `sensor_name` in readings).
        sensor_driver:
          type: string
          description: Sensor driver identifier (e.g. "sensor-hub-http-temperature").
        config:
          type: object
          additionalProperties:
            type: string
          description: >-
            Driver-specific configuration key-value pairs. Each driver declares
            which keys it expects via the GET /drivers endpoint. Sensitive
            values are masked as "****" in GET responses.
        health_status:
          type: string
          description: Health status ("good", "bad", or "unknown").
        health_reason:
          type: string
          description: Optional short reason or message describing health state.
        enabled:
          type: boolean
          description: Whether the sensor is enabled for collection.
      required:
        - id
        - name
        - sensor_driver
      example:
        id: 1
        name: "living-room"
        sensor_driver: "sensor-hub-http-temperature"
        config:
          url: "http://sensor.local/28-0000065f2ff3"
        health_status: "good"
        health_reason: "ok"
        enabled: true

    ConfigFieldSpec:
      type: object
      description: Describes a single configuration field that a driver expects.
      properties:
        key:
          type: string
          description: Machine-readable key (used in config map).
        label:
          type: string
          description: Human-readable label for display.
        description:
          type: string
          description: Help text explaining this field.
        required:
          type: boolean
          description: Whether this field must be provided.
        sensitive:
          type: boolean
          description: >-
            Whether this field contains a secret. Sensitive values are masked
            as "****" in GET responses.
        default:
          type: string
          description: Default value if not specified.
      required:
        - key
        - label
        - required
        - sensitive

    DriverInfo:
      type: object
      description: Metadata and config schema for a sensor driver.
      properties:
        type:
          type: string
          description: Unique driver identifier (e.g. "sensor-hub-http-temperature").
        display_name:
          type: string
          description: Human-readable driver name.
        description:
          type: string
          description: Short description of the driver's purpose.
        supported_measurement_types:
          type: array
          items:
            type: string
          description: Measurement types this driver can produce.
        config_fields:
          type: array
          items:
            $ref: '#/components/schemas/ConfigFieldSpec'
          description: Config fields the driver expects.
      required:
        - type
        - display_name
        - config_fields
      example:
        type: "sensor-hub-http-temperature"
        display_name: "Sensor Hub HTTP Temperature"
        description: "Reads temperature from a Sensor Hub HTTP endpoint."
        supported_measurement_types:
          - "temperature"
        config_fields:
          - key: "url"
            label: "Sensor URL"
            description: "Base URL of the HTTP sensor (e.g. http://192.168.1.50:8080)"
            required: true
            sensitive: false

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Human-readable error message.
      required:
        - message

    SensorHealthRecord:
      type: object
      description: Historical health check record for a sensor.
      properties:
        id:
          type: integer
          description: Internal identifier for the health history record (database id).
        sensor_id:
          type: string
          description: Internal sensor identifier.
        health_status:
          $ref: '#/components/schemas/SensorHealthStatus'
        recorded_at:
          type: string
          format: date-time
          description: When the health check was recorded (RFC3339).
      required:
        - id
        - sensor_id
        - health_status
        - recorded_at

    SensorTotalReadings:
      type: object
      description: Simple stat object counting total readings per sensor.
      properties:
        sensor_name:
          type: string
        total_readings:
          type: integer
      required:
        - sensor_name
        - total_readings

    SensorHealthStatus:
      type: string
      description: Enum matching types.SensorHealthStatus in Go.
      enum:
        - bad
        - good
        - unknown

    PropertiesMap:
      type: object
      description: |
        Flat map of configuration keys to values (all values as strings).
        Sensitive values are masked ("*****") in responses.
      additionalProperties:
        type: string
      example:
        smtp.user: "admin@example.com"
        smtp.recipient: "alerts@example.com"
        database.path: "data/sensor_hub.db"
        sensor.collection.interval: "300"

    UpdatePropertiesRequest:
      type: object
      description: Map of properties to update. Use the literal string "*****" to indicate no change for sensitive keys.
      additionalProperties:
        type: string
      example:
        smtp.user: "new-user@example.com"
        oauth.client_secret: "*****"

    PropertiesWebSocketMessage:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: Server timestamp for the message.
        properties:
          $ref: '#/components/schemas/PropertiesMap'
      required:
        - timestamp
        - properties

    OperationAccepted:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    # =========================================================================
    # Auth Schemas
    # =========================================================================
    LoginRequest:
      type: object
      description: Login request body
      properties:
        username:
          type: string
          description: Username
        password:
          type: string
          description: Password
      required:
        - username
        - password

    LoginResponse:
      type: object
      description: Successful login response
      properties:
        must_change_password:
          type: boolean
          description: Whether user must change password
        csrf_token:
          type: string
          description: CSRF token to include in X-CSRF-Token header for state changes

    RateLimitResponse:
      type: object
      description: Rate limit exceeded response
      properties:
        message:
          type: string
        retry_after:
          type: integer
          description: Seconds until retry is allowed
        failed_by_user:
          type: integer
        failed_by_ip:
          type: integer
        threshold:
          type: integer
        exponent:
          type: integer

    MeResponse:
      type: object
      description: Current user info response
      properties:
        user:
          $ref: '#/components/schemas/User'
        csrf_token:
          type: string
          description: Current CSRF token

    SessionInfo:
      type: object
      description: Session information
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        last_accessed_at:
          type: string
          format: date-time
        ip_address:
          type: string
        user_agent:
          type: string
        current:
          type: boolean
          description: Whether this is the current session

    # =========================================================================
    # User Schemas
    # =========================================================================
    User:
      type: object
      description: User information
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        disabled:
          type: boolean
        must_change_password:
          type: boolean
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - username

    CreateUserRequest:
      type: object
      description: Create user request body
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        roles:
          type: array
          items:
            type: string
      required:
        - username
        - password

    ChangePasswordRequest:
      type: object
      description: Change password request body
      properties:
        user_id:
          type: integer
          description: User ID (optional, defaults to current user)
        new_password:
          type: string
      required:
        - new_password

    # =========================================================================
    # Role/Permission Schemas
    # =========================================================================
    RoleInfo:
      type: object
      description: Role information
      properties:
        id:
          type: integer
        name:
          type: string
      required:
        - id
        - name

    PermissionInfo:
      type: object
      description: Permission information
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
      required:
        - id
        - name

    # =========================================================================
    # Alert Schemas
    # =========================================================================
    AlertRule:
      type: object
      description: Alert rule configuration
      properties:
        ID:
          type: integer
        SensorID:
          type: integer
        SensorName:
          type: string
        AlertType:
          type: string
          enum: [numeric_range, status_based]
          description: Type of alert (threshold-based or status-based)
        HighThreshold:
          type: number
          format: float
          nullable: true
        LowThreshold:
          type: number
          format: float
          nullable: true
        TriggerStatus:
          type: string
          description: Status that triggers alert (for status_based type)
        Enabled:
          type: boolean
        RateLimitHours:
          type: integer
          description: Minimum hours between alerts
        LastAlertSentAt:
          type: string
          format: date-time
          nullable: true
        MeasurementTypeId:
          type: integer
          description: Foreign key to measurement_types table.
        MeasurementType:
          type: string
          description: Human-readable measurement type name (e.g. "temperature").
      required:
        - SensorID
        - AlertType
        - MeasurementTypeId
        - Enabled

    AlertHistoryEntry:
      type: object
      description: Historical alert event
      properties:
        id:
          type: integer
        sensor_id:
          type: integer
        measurement_type_id:
          type: integer
          description: Foreign key to measurement_types table.
        alert_type:
          type: string
        reading_value:
          type: string
        sent_at:
          type: string
          format: date-time
      required:
        - id
        - sensor_id
        - alert_type
        - sent_at

    # =========================================================================
    # Notification Schemas
    # =========================================================================
    Notification:
      type: object
      description: Notification base object
      properties:
        id:
          type: integer
        category:
          type: string
          enum: [threshold_alert, user_management, config_change]
        severity:
          type: string
          enum: [info, warning, error]
        title:
          type: string
        message:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
      required:
        - id
        - category
        - severity
        - title
        - message

    UserNotification:
      type: object
      description: User-specific notification with read/dismiss state
      properties:
        id:
          type: integer
        user_id:
          type: integer
        notification_id:
          type: integer
        is_read:
          type: boolean
        is_dismissed:
          type: boolean
        read_at:
          type: string
          format: date-time
          nullable: true
        dismissed_at:
          type: string
          format: date-time
          nullable: true
        notification:
          $ref: '#/components/schemas/Notification'

    ChannelPreference:
      type: object
      description: Notification channel preference
      properties:
        user_id:
          type: integer
        category:
          type: string
          enum: [threshold_alert, user_management, config_change]
        email_enabled:
          type: boolean
        inapp_enabled:
          type: boolean
      required:
        - category

    # =========================================================================
    # OAuth Schemas
    # =========================================================================
    OAuthStatus:
      type: object
      description: OAuth configuration status
      additionalProperties: true
      example:
        ready: true
        has_credentials: true
        has_token: true

    OAuthAuthorizeResponse:
      type: object
      description: OAuth authorization URL response
      properties:
        auth_url:
          type: string
          description: URL to redirect user for authorization
        state:
          type: string
          description: CSRF state token
      required:
        - auth_url
        - state

    OAuthSubmitCodeRequest:
      type: object
      description: OAuth code submission request
      properties:
        code:
          type: string
          description: Authorization code from OAuth provider
        state:
          type: string
          description: CSRF state token from authorize response
      required:
        - code
        - state

    # =========================================================================
    # Dashboard Schemas
    # =========================================================================
    Dashboard:
      type: object
      description: A user's saved dashboard configuration
      properties:
        id:
          type: integer
        user_id:
          type: integer
        name:
          type: string
        config:
          type: string
          description: JSON-encoded widget layout and configuration
        shared:
          type: boolean
        is_default:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - user_id
        - name
        - config

    CreateDashboardRequest:
      type: object
      description: Request body for creating a dashboard
      properties:
        name:
          type: string
        config:
          $ref: '#/components/schemas/DashboardConfig'
      required:
        - name

    UpdateDashboardRequest:
      type: object
      description: Request body for updating a dashboard
      properties:
        name:
          type: string
        config:
          $ref: '#/components/schemas/DashboardConfig'

    ShareDashboardRequest:
      type: object
      description: Request body for sharing a dashboard
      properties:
        target_user_id:
          type: integer
      required:
        - target_user_id

    DashboardConfig:
      type: object
      description: Widget layout and configuration stored as the dashboard config
      properties:
        widgets:
          type: array
          items:
            $ref: '#/components/schemas/DashboardWidget'
        breakpoints:
          type: object
          properties:
            lg: { type: integer }
            md: { type: integer }
            sm: { type: integer }

    DashboardWidget:
      type: object
      description: A single widget on the dashboard
      properties:
        id:
          type: string
        type:
          type: string
        config:
          type: object
          additionalProperties: true
        layout:
          type: object
          properties:
            x: { type: integer }
            y: { type: integer }
            w: { type: integer }
            h: { type: integer }

    # =========================================================================
    # Generic Schemas
    # =========================================================================
    SuccessMessage:
      type: object
      description: Generic success response
      properties:
        message:
          type: string
      required:
        - message

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sensor_hub_session
      description: Session cookie set after successful login. Configurable via AuthSessionCookieName.
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: CSRF token returned from login, required for state-changing operations (POST, PUT, PATCH, DELETE).
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: >-
        API key for programmatic and CLI access.
        Exempt from CSRF validation. Create keys via the
        API Keys management endpoints.

  # Optional: group endpoints for UIs and tooling
  tags:
    - name: readings
      description: Endpoints related to sensor readings and real-time updates
    - name: sensors
      description: Endpoints related to sensor metadata and control
    - name: properties
      description: Endpoints to read and update application, SMTP, and database properties
    - name: auth
      description: Authentication and session management endpoints
    - name: users
      description: User management endpoints
    - name: roles
      description: Role and permission management endpoints
    - name: alerts
      description: Alert rule configuration and history endpoints
    - name: notifications
      description: In-app notification management and real-time updates
    - name: oauth
      description: OAuth configuration for Gmail integration
    - name: dashboards
      description: Dashboard CRUD and sharing endpoints
    - name: api-keys
      description: API key management for programmatic and CLI access
