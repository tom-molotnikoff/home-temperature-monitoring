openapi: 3.1.0
info:
  title: Sensor Hub API
  version: 1.0.0
  description: >-
    API for Sensor Hub. Provides endpoints for managing sensors,
    querying raw readings, hourly averaged readings, updating application
    properties, managing users and RBAC, dashboards and more. Authentication is
    cookie-based with CSRF protection, as well as API Key for service-to-service
    communication. WebSocket endpoints are available for real-time updates of
    sensor readings and properties changes.
servers:
  - url: http://localhost:8080/api

security:
  - cookieAuth: []
    csrfToken: []
  - apiKeyAuth: []

paths:
  /health:
    get:
      tags:
        - health
      summary: Health check
      description: Returns the health status of the API server. No authentication required.
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /readings/hourly/between:
    get:
      tags:
        - readings
      summary: Get hourly-averaged readings between two dates
      description: >-
        Returns one averaged reading per hour for the specified date range
        (inclusive). Useful for plotting long-term trends or generating hourly
        aggregate graphs. Each returned item is a `Reading` where the
        `time` value represents the aggregator timestamp for the hour (typically
        the start of the hour). Timestamps are RFC3339 strings.
      operationId: getHourlyReadingsBetweenDates
      x-required-permission: view_readingsRead
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Start date (YYYY-MM-DD)
          example: "2026-01-01"
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date
          description: End date (YYYY-MM-DD)
          example: "2026-01-07"
        - name: type
          in: query
          required: false
          schema:
            type: string
          description: Filter by measurement type (e.g. "temperature", "humidity")
          example: "temperature"
        - name: sensor
          in: query
          required: false
          schema:
            type: string
          description: Filter by sensor name
          example: "living-room"
      responses:
        '200':
          description: Array of hourly averaged readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reading'
              examples:
                sample-hourly-response:
                  value:
                    - id: 1
                      sensor_name: "living-room"
                      measurement_type: "temperature"
                      numeric_value: 21.2
                      text_state: null
                      unit: "°C"
                      time: "2026-01-01T12:00:00Z"
                    - id: 2
                      sensor_name: "bedroom"
                      measurement_type: "temperature"
                      numeric_value: 19.8
                      text_state: null
                      unit: "°C"
                      time: "2026-01-01T12:00:00Z"
        '400':
          description: Invalid date range or missing parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /readings/between:
    get:
      tags:
        - readings
      summary: Get raw readings between two dates
      description: >-
        Returns all individual sensor readings between the start and end
        dates (inclusive). Use this when you need the raw dataset (for example
        to compute custom aggregations, smoothing, or to re-process values).
        Results are ordered by time ascending. Each reading contains the
        recorded timestamp (RFC3339), a `sensor_name` identifying the source,
        the `measurement_type`, `numeric_value`, and `unit`.
      operationId: getReadingsBetweenDates
      x-required-permission: view_readings
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Start date (YYYY-MM-DD). Interpreted inclusive.
          example: "2026-01-01"
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date
          description: End date (YYYY-MM-DD). Interpreted inclusive.
          example: "2026-01-02"
        - name: type
          in: query
          required: false
          schema:
            type: string
          description: Filter by measurement type (e.g. "temperature", "humidity")
          example: "temperature"
        - name: sensor
          in: query
          required: false
          schema:
            type: string
          description: Filter by sensor name
          example: "living-room"
      responses:
        '200':
          description: Array of sensor readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reading'
              examples:
                sample-raw-response:
                  value:
                    - id: 101
                      sensor_name: "living-room"
                      measurement_type: "temperature"
                      numeric_value: 21.4
                      text_state: null
                      unit: "°C"
                      time: "2026-01-01T12:00:00Z"
                    - id: 102
                      sensor_name: "living-room"
                      measurement_type: "temperature"
                      numeric_value: 21.5
                      text_state: null
                      unit: "°C"
                      time: "2026-01-01T12:05:00Z"
        '400':
          description: Invalid date range or missing parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /readings/ws/current:
    get:
      tags:
        - readings
      summary: WebSocket endpoint — subscribe to current readings
      description: >-
        Upgrades the HTTP connection to a WebSocket. After the connection is
        established the server will immediately send a snapshot message with
        current/latest readings for all sensors, and subsequently push
        updates when sensor readings arrive. Message formats are defined under
        `components/schemas` (see `CurrentReadingsMessage` and
        `Reading`). Snapshot messages contain an array of the latest
        readings per sensor; incremental messages will be single `Reading` objects.
      operationId: subscribeCurrentReadings
      x-required-permission: view_readings
      responses:
        '101':
          description: Switching Protocols — connection upgraded to WebSocket
        '200':
          description: Non-upgrade response (some clients may receive HTTP 200 if upgrade fails)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-websocket:
        # Non-standard extension to help tooling understand websocket usage.
        description: |
          WebSocket sends JSON messages. First message after connect is a
          `CurrentReadingsMessage` (snapshot). Subsequent messages are
          either `CurrentReadingsMessage` (full snapshot) or single
          `Reading` objects for incremental updates.
        messages:
          snapshot:
            summary: Full snapshot containing latest reading for each sensor
            schema:
              $ref: '#/components/schemas/CurrentReadingsMessage'
            example:
              timestamp: "2026-01-10T12:00:00Z"
              readings:
                - id: 201
                  sensor_name: "living-room"
                  measurement_type: "temperature"
                  numeric_value: 21.4
                  text_state: null
                  unit: "°C"
                  time: "2026-01-10T12:00:00Z"
                - id: 202
                  sensor_name: "bedroom"
                  measurement_type: "temperature"
                  numeric_value: 19.8
                  text_state: null
                  unit: "°C"
                  time: "2026-01-10T12:00:10Z"
          update:
            summary: Incremental single-reading message
            schema:
              $ref: '#/components/schemas/Reading'
            example:
              id: 301
              sensor_name: "living-room"
              measurement_type: "temperature"
              numeric_value: 21.5
              text_state: null
              unit: "°C"
              time: "2026-01-10T12:01:00Z"

  /sensors/ws/{type}:
    get:
      tags:
        - sensors
      summary: WebSocket endpoint — subscribe to sensor metadata by type
      description: >-
        Upgrades the HTTP connection to a WebSocket and sends a snapshot of
        sensors matching the given type. This is used by the backend to push
        sensor lists and potentially sensor updates. The initial message is an
        array of `Sensor` objects. Subsequent messages depend on backend events
        and may be full sensor arrays or incremental sensor objects.
      operationId: subscribeSensorsByType
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
          description: Sensor driver to subscribe to (e.g. "sensor-hub-http-temperature"). Filters sensors by their driver.
          example: "sensor-hub-http-temperature"
      responses:
        '101':
          description: Switching Protocols — connection upgraded to WebSocket
        '400':
          description: Missing or invalid path parameter
        '200':
          description: Non-upgrade response (error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-websocket:
        description: |
          WebSocket sends JSON messages. First message is a snapshot: an array
          of Sensor objects. Subsequent messages may be snapshot arrays or
          single Sensor objects for incremental updates.
        messages:
          snapshot:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Sensor'
            example:
              - id: 1
                name: "living-room"
                sensor_driver: "sensor-hub-http-temperature"
                config:
                  url: "http://sensor.local/28-0000065f2ff3"
                health_status: "good"
                health_reason: "ok"
                enabled: true

  # REST sensor endpoints (create/update/list/get). NOTE: DELETE operation is intentionally omitted from the public OpenAPI spec to avoid accidental removal of sensors by automated tools (see component-level notes and code-level protections in the repo).
  /sensors:
    post:
      tags:
        - sensors
      summary: Add a new sensor
      description: >-
        Create a new sensor. The server will assign an `id`. Provide at minimum
        `name` and `sensor_driver`. This OpenAPI spec intentionally omits DELETE
        operations so management/control planes (MCPs) don't automatically
        remove sensors. It is recommended to disable sensors via the `enabled`
        field instead of deleting them, deleting removes all historical data and 
        should be a manual operation only, absolutely only when necessary.
      operationId: addSensor
      x-required-permission: manage_sensors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Sensor'
      responses:
        '201':
          description: Sensor created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sensor'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict (sensor with same name exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - sensors
      summary: List all sensors
      description: >-
        Returns an array of all known sensors. Use driver filtering via
        `/sensors/driver/{driver}` when appropriate.
      operationId: getAllSensors
      x-required-permission: view_sensors
      responses:
        '200':
          description: Array of sensors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Sensor'

  /sensors/{id}:
    put:
      tags:
        - sensors
      summary: Update an existing sensor by id
      description: >-
        Update a sensor's mutable fields. The `id` path parameter identifies
        which sensor to update. Clients should only send fields that are
        intended to change; unspecified fields will remain unchanged.
      operationId: updateSensorById
      x-required-permission: manage_sensors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Numeric database id of the sensor to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Sensor'
      responses:
        '200':
          description: Sensor updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sensor'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Sensor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sensors/{name}:
    get:
      tags:
        - sensors
      summary: Get sensor by name
      description: >-
        Retrieve sensor metadata by its human-readable `name` (this is the same
        `name` that appears in sensor readings as `sensor_name`). Useful for
        mapping series names to sensor configuration, Health Information and Sensor ID.
      operationId: getSensorByName
      x-required-permission: view_sensors
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sensor object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sensor'
        '400':
          description: Sensor name required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
        '403':
          description: Insufficient permissions
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - sensors
      summary: Delete sensor by name
      description: >-
        **WARNING:** Deletes a sensor and ALL associated historical data.
        This operation is irreversible. Consider using disable instead.
        Requires delete_sensors permission (separate from manage_sensors).
      operationId: deleteSensorByName
      x-required-permission: delete_sensors
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Sensor name
      responses:
        '200':
          description: Sensor deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: Sensor name required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
        '403':
          description: Insufficient permissions
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    head:
      tags:
        - sensors
      summary: Check if sensor exists
      description: Returns 200 if sensor exists, 404 if not. Requires view_sensors permission.
      operationId: sensorExists
      x-required-permission: view_sensors
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Sensor name
      responses:
        '200':
          description: Sensor exists
        '400':
          description: Sensor name required
        '401':
          description: Not authenticated
        '403':
          description: Insufficient permissions
        '404':
          description: Sensor not found
        '500':
          description: Server error

  /sensors/driver/{driver}:
    get:
      tags:
        - sensors
      summary: Get sensors by driver
      description: >-
        Retrieve sensors that match the requested `driver` (for example,
        `sensor-hub-http-temperature`); useful for subscribing or filtering
        by sensor driver.
      operationId: getSensorsByDriver
      x-required-permission: view_sensors
      parameters:
        - name: driver
          in: path
          required: true
          schema:
            type: string
          description: Sensor driver identifier
      responses:
        '200':
          description: Array of sensors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Sensor'

  /sensors/health/{name}:
    get:
      tags:
        - sensors
      summary: Get sensor health history
      description: >-
        Return historical health checks for a sensor. A `limit` query
        parameter may be provided to restrict the number of returned records
        (default is defined by the server configuration).
      operationId: getSensorHealthHistoryByName
      x-required-permission: view_sensors
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          description: Max number of history records to return (server default applies if omitted)
      responses:
        '200':
          description: Array of health history records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SensorHealthRecord'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Sensor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sensors/stats/total-readings:
    get:
      tags:
        - sensors
      summary: Get total readings per sensor
      description: >-
        Returns statistics counting total readings for each sensor (useful for
        usage dashboards and validation of ingestion).
      operationId: getTotalReadingsPerSensor
      x-required-permission: view_sensors
      responses:
        '200':
          description: Array of sensor reading counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SensorTotalReadings'

  /sensors/collect:
    post:
      tags:
        - sensors
      summary: Trigger reading collection for all sensors
      description: >-
        Triggers immediate collection of readings from all enabled sensors.
        Requires trigger_readings permission.
      operationId: collectAllSensorReadings
      x-required-permission: trigger_readings
      responses:
        '200':
          description: Collection triggered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '401':
          description: Not authenticated
        '403':
          description: Insufficient permissions
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sensors/collect/{sensorName}:
    post:
      tags:
        - sensors
      summary: Trigger reading collection for specific sensor
      description: >-
        Triggers immediate collection of a reading from a specific sensor.
        Requires trigger_readings permission.
      operationId: collectFromSensor
      x-required-permission: trigger_readings
      parameters:
        - name: sensorName
          in: path
          required: true
          schema:
            type: string
          description: Sensor name
      responses:
        '200':
          description: Collection triggered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: Sensor name required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
        '403':
          description: Insufficient permissions
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sensors/disable/{sensorName}:
    post:
      tags:
        - sensors
      summary: Disable a sensor
      description: >-
        Disables a sensor, stopping automatic collection. Historical data is preserved.
        Requires manage_sensors permission.
      operationId: disableSensor
      x-required-permission: manage_sensors
      parameters:
        - name: sensorName
          in: path
          required: true
          schema:
            type: string
          description: Sensor name
      responses:
        '200':
          description: Sensor disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: Sensor name required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
        '403':
          description: Insufficient permissions
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sensors/enable/{sensorName}:
    post:
      tags:
        - sensors
      summary: Enable a sensor
      description: >-
        Enables a sensor for automatic collection.
        Requires manage_sensors permission.
      operationId: enableSensor
      x-required-permission: manage_sensors
      parameters:
        - name: sensorName
          in: path
          required: true
          schema:
            type: string
          description: Sensor name
      responses:
        '200':
          description: Sensor enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: Sensor name required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
        '403':
          description: Insufficient permissions
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /drivers:
    get:
      tags:
        - drivers
      summary: List available sensor drivers
      description: >-
        Returns metadata and config field schemas for all registered sensor
        drivers. Use this to discover which drivers are available and what
        configuration each driver requires when creating or updating a sensor.
      operationId: listDrivers
      responses:
        '200':
          description: Array of driver metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DriverInfo'

  /properties:
    get:
      tags:
        - properties
      summary: Get current application properties
      description: >-
        Returns a flat object mapping property keys to their current values.
        Sensitive properties (such as OAuth secrets) are masked in
        responses as `"*****"` to avoid leaking secrets. Values are returned
        as strings.
      operationId: getProperties
      x-required-permission: view_properties
      responses:
        '200':
          description: Current properties
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertiesMap'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - properties
      summary: Update application properties
      description: >-
        Update one or more properties. Pass a JSON object where keys are the
        property names and values are the desired string values. To keep
        sensitive properties secret when you don't want to change them, pass
        the literal string `"*****"` as the value; the server will treat this
        as "do not change" for known sensitive keys.

        The update will be validated, applied to the in-memory configuration,
        and persisted to configuration files asynchronously. A broadcast is
        sent to the properties WebSocket topic after the update. Note: there is
        no separate endpoint for editing `smtp.properties` or `database.properties` —
        they are updated by key through this same API.
      operationId: updateProperties
      x-required-permission: manage_properties
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePropertiesRequest'
      responses:
        '202':
          description: Accepted — update applied asynchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationAccepted'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /properties/ws:
    get:
      tags:
        - properties
      summary: WebSocket endpoint — subscribe to properties updates
      description: >-
        Upgrades the HTTP connection to a WebSocket and sends the current
        properties as a JSON object. Subsequent messages are sent when
        properties are updated (the server broadcasts the full properties map).
      operationId: propertiesWebSocket
      x-required-permission: view_properties
      responses:
        '101':
          description: Switching Protocols — connection upgraded to WebSocket
        '200':
          description: Non-upgrade response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-websocket:
        description: |
          WebSocket messages are JSON objects matching `PropertiesWebSocketMessage`.
          The first message after connect is the current properties map.
        messages:
          snapshot:
            schema:
              $ref: '#/components/schemas/PropertiesWebSocketMessage'
            example:
              timestamp: "2026-01-10T12:00:00Z"
              properties:
                smtp.user: "admin@example.com"
                smtp.recipient: "alerts@example.com"
                sensor.collection.interval: "300"

  # ============================================================================
  # Auth Endpoints
  # ============================================================================
  /auth/login:
    post:
      tags:
        - auth
      summary: Authenticate user
      description: >-
        Authenticates a user with username and password. On success, sets a
        session cookie and returns a CSRF token. The CSRF token must be sent
        in the X-CSRF-Token header for all state-changing requests.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Session cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many failed attempts
          headers:
            Retry-After:
              schema:
                type: integer
              description: Seconds until retry is allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitResponse'

  /auth/logout:
    post:
      tags:
        - auth
