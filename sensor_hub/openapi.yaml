          description: OAuth not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    SensorReading:
      type: object
      description: |
        A single sensor reading. Use `time` as the event timestamp and
        `sensor_name` to identify the source. `temperature` is the reading
        value at that timestamp. `id` is an internal integer identifier for
        the reading (if available).
      properties:
        id:
          type: integer
          description: Internal identifier for the reading (if available).
        sensor_name:
          type: string
          description: Human-readable sensor name. This is the series key an MCP should use to group measurements.
        time:
          type: string
          format: date-time
          description: RFC3339 timestamp for when the reading was recorded. Use this for x-axis time in graphs.
        temperature:
          type: number
          format: float
          description: Numeric temperature value recorded by the sensor.
      required:
        - sensor_name
        - time
        - temperature
      example:
        id: 101
        sensor_name: "living-room"
        time: "2026-01-10T12:00:00Z"
        temperature: 21.4

    CurrentTemperaturesMessage:
      type: object
      description: |
        Snapshot message containing the latest readings for one or more sensors.
        Sent immediately after WebSocket connect and optionally as full-snapshot updates.
      properties:
        timestamp:
          type: string
          format: date-time
          description: Server timestamp for the snapshot (RFC3339).
        readings:
          type: array
          items:
            $ref: '#/components/schemas/SensorReading'
      required:
        - timestamp
        - readings
      example:
        timestamp: "2026-01-10T12:00:00Z"
        readings:
          - id: 201
            sensor_name: "living-room"
            time: "2026-01-10T12:00:00Z"
            temperature: 21.4
          - id: 202
            sensor_name: "bedroom"
            time: "2026-01-10T12:00:10Z"
            temperature: 19.8

    Sensor:
      type: object
      description: |
        Metadata for a sensor as returned by sensors endpoints and WebSocket snapshots.
      properties:
        id:
          type: integer
          description: Internal numeric id for the sensor (database primary key).
        name:
          type: string
          description: Human-friendly sensor name (used as `sensor_name` in readings).
        type:
          type: string
          description: Sensor type (e.g. "temperature", "humidity").
        url:
          type: string
          description: Optional URL or endpoint where the sensor can be queried.
        health_status:
          type: string
          description: Health status ("good", "bad", or "unknown").
        health_reason:
          type: string
          description: Optional short reason or message describing health state.
        enabled:
          type: boolean
          description: Whether the sensor is enabled for collection.
      required:
        - id
        - name
        - type
      example:
        id: 1
        name: "living-room"
        type: "temperature"
        url: "http://sensor.local/28-0000065f2ff3"
        health_status: "good"
        health_reason: "ok"
        enabled: true

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Human-readable error message.
      required:
        - message

    SensorHealthRecord:
      type: object
      description: Historical health check record for a sensor.
      properties:
        id:
          type: integer
          description: Internal identifier for the health history record (database id).
        sensor_id:
          type: string
          description: Internal sensor identifier.
        health_status:
          $ref: '#/components/schemas/SensorHealthStatus'
        recorded_at:
          type: string
          format: date-time
          description: When the health check was recorded (RFC3339).
      required:
        - id
        - sensor_id
        - health_status
        - recorded_at

    SensorTotalReadings:
      type: object
      description: Simple stat object counting total readings per sensor.
      properties:
        sensor_name:
          type: string
        total_readings:
          type: integer
      required:
        - sensor_name
        - total_readings

    SensorHealthStatus:
      type: string
      description: Enum matching types.SensorHealthStatus in Go.
      enum:
        - bad
        - good
        - unknown

    PropertiesMap:
      type: object
      description: |
        Flat map of configuration keys to values (all values as strings).
        Sensitive values are masked ("*****") in responses.
      additionalProperties:
        type: string
      example:
        smtp.user: "admin@example.com"
        smtp.recipient: "alerts@example.com"
        database.path: "data/sensor_hub.db"
        sensor.collection.interval: "300"

    UpdatePropertiesRequest:
      type: object
      description: Map of properties to update. Use the literal string "*****" to indicate no change for sensitive keys.
      additionalProperties:
        type: string
      example:
        smtp.user: "new-user@example.com"
        oauth.client_secret: "*****"

    PropertiesWebSocketMessage:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: Server timestamp for the message.
        properties:
          $ref: '#/components/schemas/PropertiesMap'
      required:
        - timestamp
        - properties

    OperationAccepted:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    # =========================================================================
    # Auth Schemas
    # =========================================================================
    LoginRequest:
      type: object
      description: Login request body
      properties:
        username:
          type: string
          description: Username
        password:
          type: string
          description: Password
      required:
        - username
        - password

    LoginResponse:
      type: object
      description: Successful login response
      properties:
        must_change_password:
          type: boolean
          description: Whether user must change password
        csrf_token:
          type: string
          description: CSRF token to include in X-CSRF-Token header for state changes

    RateLimitResponse:
      type: object
      description: Rate limit exceeded response
      properties:
        message:
          type: string
        retry_after:
          type: integer
          description: Seconds until retry is allowed
        failed_by_user:
          type: integer
        failed_by_ip:
          type: integer
        threshold:
          type: integer
        exponent:
          type: integer

    MeResponse:
      type: object
      description: Current user info response
      properties:
        user:
          $ref: '#/components/schemas/User'
        csrf_token:
          type: string
          description: Current CSRF token

    SessionInfo:
      type: object
      description: Session information
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        last_accessed_at:
          type: string
          format: date-time
        ip_address:
          type: string
        user_agent:
          type: string
        current:
          type: boolean
          description: Whether this is the current session

    # =========================================================================
    # User Schemas
    # =========================================================================
    User:
      type: object
      description: User information
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        disabled:
          type: boolean
        must_change_password:
          type: boolean
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - username

    CreateUserRequest:
      type: object
      description: Create user request body
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        roles:
          type: array
          items:
            type: string
      required:
        - username
        - password

    ChangePasswordRequest:
      type: object
      description: Change password request body
      properties:
        user_id:
          type: integer
          description: User ID (optional, defaults to current user)
        new_password:
          type: string
      required:
        - new_password

    # =========================================================================
    # Role/Permission Schemas
    # =========================================================================
    RoleInfo:
      type: object
      description: Role information
      properties:
        id:
          type: integer
        name:
          type: string
      required:
        - id
        - name

    PermissionInfo:
      type: object
      description: Permission information
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
      required:
        - id
        - name

    # =========================================================================
    # Alert Schemas
    # =========================================================================
    AlertRule:
      type: object
      description: Alert rule configuration
      properties:
        ID:
          type: integer
        SensorID:
          type: integer
        SensorName:
          type: string
        AlertType:
          type: string
          enum: [numeric_range, status_based]
          description: Type of alert (threshold-based or status-based)
        HighThreshold:
          type: number
          format: float
          nullable: true
        LowThreshold:
          type: number
          format: float
          nullable: true
        TriggerStatus:
          type: string
          description: Status that triggers alert (for status_based type)
        Enabled:
          type: boolean
        RateLimitHours:
          type: integer
          description: Minimum hours between alerts
        LastAlertSentAt:
          type: string
          format: date-time
          nullable: true
      required:
        - SensorID
        - AlertType
        - Enabled

    AlertHistoryEntry:
      type: object
      description: Historical alert event
      properties:
        id:
          type: integer
        sensor_id:
          type: integer
        alert_type:
          type: string
        reading_value:
          type: string
        sent_at:
          type: string
          format: date-time
      required:
        - id
        - sensor_id
        - alert_type
        - sent_at

    # =========================================================================
    # Notification Schemas
    # =========================================================================
    Notification:
      type: object
      description: Notification base object
      properties:
        id:
          type: integer
        category:
          type: string
          enum: [threshold_alert, user_management, config_change]
        severity:
          type: string
          enum: [info, warning, error]
        title:
          type: string
        message:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
      required:
        - id
        - category
        - severity
        - title
        - message

    UserNotification:
      type: object
      description: User-specific notification with read/dismiss state
      properties:
        id:
          type: integer
        user_id:
          type: integer
        notification_id:
          type: integer
        is_read:
          type: boolean
        is_dismissed:
          type: boolean
        read_at:
          type: string
          format: date-time
          nullable: true
        dismissed_at:
          type: string
          format: date-time
          nullable: true
        notification:
          $ref: '#/components/schemas/Notification'

    ChannelPreference:
      type: object
      description: Notification channel preference
      properties:
        user_id:
          type: integer
        category:
          type: string
          enum: [threshold_alert, user_management, config_change]
        email_enabled:
          type: boolean
        inapp_enabled:
          type: boolean
      required:
        - category

    # =========================================================================
    # OAuth Schemas
    # =========================================================================
    OAuthStatus:
      type: object
      description: OAuth configuration status
      additionalProperties: true
      example:
        ready: true
        has_credentials: true
        has_token: true

    OAuthAuthorizeResponse:
      type: object
      description: OAuth authorization URL response
      properties:
        auth_url:
          type: string
          description: URL to redirect user for authorization
        state:
          type: string
          description: CSRF state token
      required:
        - auth_url
        - state

    OAuthSubmitCodeRequest:
      type: object
      description: OAuth code submission request
      properties:
        code:
          type: string
          description: Authorization code from OAuth provider
        state:
          type: string
          description: CSRF state token from authorize response
      required:
        - code
        - state

    # =========================================================================
    # Generic Schemas
    # =========================================================================
    SuccessMessage:
      type: object
      description: Generic success response
      properties:
        message:
          type: string
      required:
        - message

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sensor_hub_session
      description: Session cookie set after successful login. Configurable via AuthSessionCookieName.
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: CSRF token returned from login, required for state-changing operations (POST, PUT, PATCH, DELETE).

  # Optional: group endpoints for UIs and tooling
  tags:
    - name: temperature
      description: Endpoints related to temperature readings and real-time updates
    - name: sensors
      description: Endpoints related to sensor metadata and control
    - name: properties
      description: Endpoints to read and update application, SMTP, and database properties
    - name: auth
      description: Authentication and session management endpoints
    - name: users
      description: User management endpoints
    - name: roles
      description: Role and permission management endpoints
    - name: alerts
      description: Alert rule configuration and history endpoints
    - name: notifications
      description: In-app notification management and real-time updates
    - name: oauth
      description: OAuth configuration for Gmail integration
