services:
  sensor-hub:
    build:
      context: ..
      dockerfile: docker_tests/sensor-hub.dockerfile
    ports:
      - "8080:8080"
      - "2345:2345"
    volumes:
      - ../:/app
      - sensor-hub-data:/app/data
    environment:
      SENSOR_HUB_INITIAL_ADMIN: admin:adminpassword
      SENSOR_HUB_ALLOWED_ORIGIN: http://localhost:3000
  sensor-hub-ui:
    build:
      context: ../ui/sensor_hub_ui
      dockerfile: sensor-hub-ui-test.dockerfile
      args:
        VITE_API_BASE: "http://localhost:8080/api"
        VITE_WEBSOCKET_BASE: "ws://localhost:8080/api"
    ports:
      - "3000:5173"
    volumes:
      - ../ui/sensor_hub_ui:/app
      - /app/node_modules
    depends_on:
      - sensor-hub
    environment:
      HMR_POLLING: "true"
      HMR_POLLING_INTERVAL: "250"
      VITE_API_BASE: "http://localhost:8080/api"
      VITE_WEBSOCKET_BASE: "ws://localhost:8080/api"
  mock-sensor-downstairs:
    build:
      context: .
      dockerfile: mock-sensor.dockerfile
    ports:
      - "5001:5000"
  mock-sensor-upstairs:
    build:
      context: .
      dockerfile: mock-sensor.dockerfile
    ports:
      - "5002:5000"
volumes:
  sensor-hub-data:
